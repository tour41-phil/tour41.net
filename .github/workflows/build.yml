name: Build WordPress Image

on:
  push:
    branches: [main]
    paths:
      - "wordpress/**"
  workflow_dispatch:

concurrency:
  group: build-wordpress-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine whether this run may publish latest
        id: headcheck
        shell: bash
        run: |
          git fetch origin main
          MAIN_HEAD="$(git rev-parse origin/main)"

          echo "main_head=$MAIN_HEAD" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_SHA}" == "$MAIN_HEAD" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.headcheck.outputs.publish_latest == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./wordpress
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
