# ==========================================================================
# Build & push backup image to GHCR
# ==========================================================================
# Triggers:
#   - Push to main that changes backup/**
#   - Manual dispatch
#
# Tag policy:
#   - always push sha-<commit>
#   - only push latest if this run builds the current HEAD of main
# ==========================================================================

name: Build Backup Image

on:
  push:
    branches: [main]
    paths:
      - "backup/**"
      - "scripts/backup*"
  workflow_dispatch:

concurrency:
  group: build-backup-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKUP_IMAGE_NAME: ${{ github.repository }}-backup

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine whether this run may publish latest
        id: headcheck
        shell: bash
        run: |
          git fetch origin main
          MAIN_HEAD="$(git rev-parse origin/main)"

          echo "main_head=$MAIN_HEAD" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_SHA}" == "$MAIN_HEAD" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "publish_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_latest=false" >> "$GITHUB_OUTPUT"
          fi

          echo "GITHUB_REF=${GITHUB_REF}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "MAIN_HEAD=${MAIN_HEAD}"
          echo "publish_latest=$(grep '^publish_latest=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKUP_IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ steps.headcheck.outputs.publish_latest == 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./backup
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
