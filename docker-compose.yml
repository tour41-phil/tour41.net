# ==========================================================================
# tour41.net – WordPress stack
# ==========================================================================
# Services: WordPress (php-fpm), Nginx, MariaDB, Redis, Watchtower
# Routing:  Traefik (external) → Nginx → php-fpm
# Updates:  Watchtower pulls new GHCR images for selected services
# ==========================================================================

services:
  # ── MariaDB ─────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11.7.2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis (object cache) ────────────────────────────────────────────────
  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # ── WordPress (php-fpm) ─────────────────────────────────────────────────
  wordpress:
    image: ${WP_IMAGE:-ghcr.io/tour41-phil/tour41.net:latest}
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
      WORDPRESS_DB_USER: ${MYSQL_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WP_TABLE_PREFIX:-wp_}
      WP_HOME: "https://${DOMAIN:-tour41.net}"
      WP_SITEURL: "https://${DOMAIN:-tour41.net}"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_CACHE', true);
        if (getenv('WP_HOME')) define('WP_HOME', getenv('WP_HOME'));
        if (getenv('WP_SITEURL')) define('WP_SITEURL', getenv('WP_SITEURL'));
    volumes:
      - wp_data:/var/www/html
      - /opt/tour41.net-uploads:/var/www/html/wp-content/uploads
      - ${BACKUP_HOST_PATH:-.}/updraft:/backups
    networks:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27.4-alpine
    restart: unless-stopped
    depends_on:
      - wordpress
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - wp_data:/var/www/html:ro
      - /opt/tour41.net-uploads:/var/www/html/wp-content/uploads:ro
    networks:
      - backend
      - homelab_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab_network"
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.http.routers.tour41.rule=Host(`${DOMAIN:-tour41.net}`) || Host(`www.${DOMAIN:-tour41.net}`)"
      - "traefik.http.routers.tour41.entrypoints=websecure"
      - "traefik.http.routers.tour41.tls=true"
      - "traefik.http.routers.tour41.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.tour41.loadbalancer.server.port=80"
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx (weilwirsovielesind static site) ─────────────────────────────
  weilwirsovielesind-nginx:
    image: nginx:1.27.4-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/weilwirsovielesind.conf:/etc/nginx/conf.d/default.conf:ro
      - ./weilwirsovielesind:/var/www/html:ro
    networks:
      - homelab_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab_network"
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.http.routers.weilwirsovielesind.rule=Host(`${WEILWIRSOVIELESIND_DOMAIN:-weilwirsovielesind.de}`) || Host(`www.${WEILWIRSOVIELESIND_DOMAIN:-weilwirsovielesind.de}`)"
      - "traefik.http.routers.weilwirsovielesind.entrypoints=websecure"
      - "traefik.http.routers.weilwirsovielesind.tls=true"
      - "traefik.http.routers.weilwirsovielesind.tls.certresolver=${CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.services.weilwirsovielesind.loadbalancer.server.port=80"
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backup (restic + supercronic) ───────────────────────────────────────
  backup:
    image: ${BACKUP_IMAGE:-ghcr.io/tour41-phil/tour41.net-backup:latest}
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      BACKUP_NAME: ${DOMAIN:-tour41.net}
      BACKUP_CRON: ${BACKUP_CRON:-30 3 * * *}
      RUN_ON_STARTUP: ${BACKUP_RUN_ON_STARTUP:-false}

      OCI_S3_ENDPOINT: ${OCI_S3_ENDPOINT}
      OCI_BUCKET_NAME: ${OCI_BUCKET_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      RESTIC_PASSWORD: ${RESTIC_PASSWORD}
      RESTIC_KEEP_DAILY: ${RESTIC_KEEP_DAILY:-7}
      RESTIC_KEEP_WEEKLY: ${RESTIC_KEEP_WEEKLY:-4}
      RESTIC_KEEP_MONTHLY: ${RESTIC_KEEP_MONTHLY:-6}

      DB_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MYSQL_USER: ${MYSQL_USER:-wordpress}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      DOMAIN: ${DOMAIN:-tour41.net}
    volumes:
      - wp_data:/wp_data:ro
      - db_data:/db_data:ro
      - /opt/tour41.net-uploads:/opt/tour41.net-uploads:ro
      - ./.git:/repo/.git:ro
    networks:
      - backend
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower (auto-update selected services) ──────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "3600"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
    command:
      - wordpress
      - backup
    networks:
      - backend
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  db_data:
  wp_data:
  redis_data:

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  homelab_network:
    external: true
